name: Daily Pricing Scraper

permissions:
  contents: write

on:
  schedule:
    - cron: "0 19 * * *" # run daily at 19:00 UTC
  workflow_dispatch: # manual run button

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL }}
        run: |
          python scrape_pricing.py

      - name: Ingest pricing snapshot into Neon
        env:
          NETLIFY_DATABASE_URL_UNPOOLED: ${{ secrets.NETLIFY_DATABASE_URL_UNPOOLED }}
        run: |
          python scripts/ingest_pricing.py --neon

      - name: Refresh pricing views in Neon
        env:
          NEON_HOST: ${{ secrets.NEON_HOST }}
          NEON_USER: ${{ secrets.NEON_USER }}
          NEON_PASSWORD: ${{ secrets.NEON_PASSWORD }}
          NEON_DB: ${{ secrets.NEON_DB }}
        run: |
          dbt run --select stg_pricing_history stg_pricing --target dev --profiles-dir dbt --project-dir dbt

      - name: Upload run report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pricing-run-report
          path: run_report.json
          if-no-files-found: ignore

      - name: Snapshot pricing.json for history (only if changed)
        run: |
          python scripts/snapshot_if_changed.py

      - name: Update dashboard data
        run: |
          python scripts/build_dashboard_data.py --append

      - name: Commit updated pricing.json and history
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add pricing.json pricing_history/ dashboard/data/
          git commit -m "Auto-update pricing.json [skip ci]" || echo "No changes to commit"
          git push
